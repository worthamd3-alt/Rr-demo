<style>
:root{
  --paper:#f7f4ee; --card:#fffdf9; --ink:#1c2826; --muted:#6f7d79;
  --line:#e4ddd0; --accent:#0d6b5f; --accent-soft:#dcefe9; --gold:#b8852a;
  --done:#9aa6a2; --shadow:0 1px 2px rgba(28,40,38,.06),0 4px 16px rgba(28,40,38,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  background:var(--paper); color:var(--ink);
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
.wrap{max-width:540px;margin:0 auto;}
/* header */
header{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--paper) 70%,rgba(247,244,238,0));
  padding:calc(env(safe-area-inset-top) + 14px) 18px 8px;
}
.brand{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
.brand h1{
  font-family:ui-serif,"New York",Georgia,"Times New Roman",serif;font-weight:600;font-size:25px;letter-spacing:-.02em;
  margin:0;line-height:1;
}
.brand .dot{color:var(--accent);}
.tally{font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap;}
.tally b{color:var(--accent);}
.search{position:relative;margin-top:12px;}
.search input{
  width:100%;border:1.5px solid var(--line);background:var(--card);
  border-radius:13px;padding:13px 14px 13px 40px;font-size:16px;font-family:inherit;
  color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;
}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);}
main{padding:6px 14px 40px;}
.hint{font-size:12px;color:var(--muted);text-align:center;margin:4px 0 14px;line-height:1.5;}
/* city cards */
.city{
  display:flex;align-items:center;gap:14px;background:var(--card);
  border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:10px;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,border-color .12s;
}
.city:active{transform:scale(.985);border-color:var(--accent);}
.city .meta{flex:1;min-width:0;}
.city .name{font-family:ui-serif,"New York",Georgia,"Times New Roman",serif;font-size:19px;font-weight:600;letter-spacing:-.01em;}
.city .sub{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:500;}
.ring{position:relative;width:46px;height:46px;flex:none;}
.ring svg{transform:rotate(-90deg);}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--accent);}
.chev{color:var(--line);flex:none;}
/* detail */
.back{
  display:inline-flex;align-items:center;gap:6px;background:none;border:none;
  color:var(--accent);font-family:inherit;font-weight:600;font-size:14.5px;
  padding:4px 0;margin:2px 0 8px;cursor:pointer;
}
.dtitle{font-family:ui-serif,"New York",Georgia,"Times New Roman",serif;font-size:28px;font-weight:600;letter-spacing:-.02em;margin:0;}
.dbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:10px 0 4px;}
.prog{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden;}
.prog i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .35s;}
.dstat{font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap;}
.toolrow{display:flex;align-items:center;justify-content:space-between;margin:14px 0 10px;}
.toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-weight:600;cursor:pointer;user-select:none;}
.sw{width:38px;height:22px;border-radius:99px;background:var(--line);position:relative;transition:background .2s;flex:none;}
.sw i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s;}
.toggle.on .sw{background:var(--accent);}
.toggle.on .sw i{transform:translateX(16px);}
.reset{background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
/* provider row */
.prov{
  display:flex;align-items:flex-start;gap:13px;background:var(--card);
  border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:9px;
  box-shadow:var(--shadow);transition:opacity .2s,background .2s;
}
.prov.done{background:#f4f6f3;}
.check{
  width:27px;height:27px;border-radius:50%;border:2px solid var(--line);
  flex:none;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;background:#fff;
}
.check svg{opacity:0;transform:scale(.5);transition:.15s;color:#fff;}
.prov.done .check{background:var(--accent);border-color:var(--accent);}
.prov.done .check svg{opacity:1;transform:scale(1);}
.body{flex:1;min-width:0;cursor:pointer;}
.pname{font-size:16px;font-weight:700;letter-spacing:-.01em;line-height:1.25;}
.prov.done .pname{color:var(--ink);}
.badges{display:flex;align-items:center;gap:7px;margin:5px 0 2px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.02em;}
.tag.type{background:var(--accent-soft);color:var(--accent);}
.tag.ref{background:#f6ecd6;color:var(--gold);}
.addr{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.4;}
.pin{
  flex:none;width:40px;height:40px;border-radius:11px;background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;color:var(--accent);
  text-decoration:none;margin-top:1px;transition:transform .12s;
}
.pin:active{transform:scale(.9);}
.pincol{display:flex;flex-direction:column;gap:8px;flex:none;}
.pin.call{background:var(--accent);color:#fff;}
.sact svg{flex:none;}
.sheet-phone{margin:8px 2px 0;font-size:15px;font-weight:600;}
.sheet-phone a{color:var(--accent);text-decoration:none;}
.sheet-fax{margin:4px 2px 0;font-size:14px;font-weight:600;color:var(--muted);}
.edit-btn{display:inline-flex;align-items:center;gap:7px;margin:16px 0 2px;background:none;border:none;color:var(--accent);font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;padding:4px 0;}
.ed-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:14px 2px 5px;letter-spacing:.02em;}
.ed-input{width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:13px;font-size:16px;font-family:inherit;color:var(--ink);outline:none;}
.ed-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.ed-actions{display:flex;gap:10px;margin-top:22px;}
.ed-cancel{flex:1;padding:13px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
.ed-save{flex:2;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
.notebadge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:2px 7px;border-radius:99px;}
.sheet-overlay{position:fixed;inset:0;z-index:50;background:rgba(28,40,38,.34);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .22s;display:flex;align-items:flex-end;justify-content:center;}
.sheet-overlay.show{opacity:1;pointer-events:auto;}
.sheet{width:100%;max-width:540px;background:var(--paper);border-radius:22px 22px 0 0;padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(28,40,38,.22);}
.sheet-overlay.show .sheet{transform:translateY(0);}
.sheet-grip{width:38px;height:4px;border-radius:99px;background:var(--line);margin:8px auto 12px;}
.sheet-head{display:flex;align-items:flex-start;gap:12px;}
.sheet-name{font-family:ui-serif,"New York",Georgia,"Times New Roman",serif;font-size:23px;font-weight:600;letter-spacing:-.02em;line-height:1.1;}
.sheet-meta{font-size:13px;color:var(--muted);font-weight:600;margin-top:5px;}
.sheet-x{flex:none;width:32px;height:32px;border-radius:50%;border:none;background:var(--card);color:var(--muted);font-size:15px;cursor:pointer;border:1px solid var(--line);}
.sheet-actions{display:flex;gap:9px;margin:16px 0 4px;}
.sact{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;}
.sact.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.sheet-addr{font-size:13px;color:var(--muted);margin:12px 2px 0;line-height:1.4;}
.note-input{margin:18px 0 6px;}
.note-input textarea{width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:13px;padding:13px;font-size:16px;font-family:inherit;color:var(--ink);outline:none;resize:vertical;line-height:1.45;}
.note-input textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.note-save{margin-top:9px;width:100%;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
.note-save:active{opacity:.85;}
.note-list{margin-top:18px;border-top:1px solid var(--line);padding-top:6px;}
.note-empty{text-align:center;color:var(--muted);font-size:13px;padding:22px 10px;line-height:1.5;}
.note-item{padding:14px 0;border-bottom:1px solid var(--line);position:relative;}
.note-date{font-size:11.5px;font-weight:700;letter-spacing:.03em;color:var(--accent);text-transform:uppercase;}
.note-text{font-size:14.5px;line-height:1.5;margin-top:6px;white-space:pre-wrap;word-wrap:break-word;padding-right:54px;}
.note-del{position:absolute;top:14px;right:0;background:none;border:none;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.6;}
.sechead{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 4px 8px;}
footer{text-align:center;font-size:11px;color:var(--muted);padding:8px 20px 28px;line-height:1.6;}
.exportbtn{display:inline-flex;align-items:center;gap:7px;margin:4px auto 14px;background:var(--card);border:1.5px solid var(--line);color:var(--accent);font-family:inherit;font-size:13.5px;font-weight:700;padding:10px 16px;border-radius:12px;cursor:pointer;box-shadow:var(--shadow);}
.exportbtn:active{transform:scale(.97);}
.drow{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:10px;cursor:pointer;font-family:inherit;color:var(--ink);}
.drow:active{border-color:var(--accent);}
.drow .di{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;}
.drow .dt{flex:1;min-width:0;}
.drow .dt b{display:block;font-size:15px;font-weight:700;}
.drow .dt span{font-size:12.5px;color:var(--muted);}
.sheet-sub{font-size:12.5px;color:var(--muted);margin:2px 0 16px;line-height:1.5;}

/* PIN lock */
#lock{position:fixed;inset:0;z-index:100;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 30px calc(env(safe-area-inset-bottom) + 30px);text-align:center;}
#lock.hidden{display:none;}
.lk-icon{width:62px;height:62px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:18px;}
.lk-title{font-family:ui-serif,"New York",Georgia,serif;font-size:26px;font-weight:600;letter-spacing:-.02em;}
.lk-sub{font-size:14px;color:var(--muted);margin:8px 0 26px;line-height:1.5;max-width:300px;}
.dots{display:flex;gap:15px;margin-bottom:30px;height:16px;}
.dots i{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);transition:background .12s;}
.dots i.on{background:var(--accent);}
.dots.bad{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:280px;}
.pad button{height:64px;border:none;border-radius:16px;background:var(--card);box-shadow:var(--shadow);font-family:inherit;font-size:25px;font-weight:500;color:var(--ink);cursor:pointer;}
.pad button:active{background:var(--accent-soft);}
.pad button.blank{background:none;box-shadow:none;cursor:default;}
.pad button.fn{font-size:14px;font-weight:600;color:var(--muted);}
.lk-skip{margin-top:24px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:13.5px;font-weight:600;text-decoration:underline;text-underline-offset:2px;cursor:pointer;}

.staff-wrap{border-top:1px solid var(--line);margin-top:14px;padding-top:12px}
.staff-head{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.staff-shared{font-size:11px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--muted);opacity:.8}
.staff-item{position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 84px 10px 12px;margin-bottom:8px}
.staff-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.staff-name{font-weight:650;font-size:15px}
.staff-title{font-size:12px;color:var(--gold);background:#f6ecd6;padding:2px 8px;border-radius:999px;font-weight:600}
.staff-note{font-size:14px;color:var(--muted);margin-top:4px;line-height:1.35}
.staff-add{width:100%;background:none;border:1px dashed var(--line);color:var(--accent);font:inherit;font-weight:600;font-size:15px;padding:11px;border-radius:12px;margin-top:2px}
.staff-form{margin-top:6px}
.staff-form .ed-input{margin-bottom:8px}

.welcome{position:fixed;inset:0;z-index:60;background:var(--paper);display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto;}
.welcome.hidden{display:none;}
.wcard{max-width:400px;width:100%;text-align:center;}
.wlogo{font-family:ui-serif,"New York",Georgia,serif;font-weight:600;font-size:34px;letter-spacing:-.02em;margin-bottom:14px;}
.wlogo .dot{color:var(--accent);}
.wtag{font-size:15.5px;color:var(--muted);line-height:1.5;margin-bottom:26px;}
.wbtn{display:block;width:100%;border-radius:13px;padding:15px;font:inherit;font-size:16px;font-weight:650;cursor:pointer;border:1.5px solid var(--line);margin-bottom:12px;}
.wprimary{background:var(--accent);color:#fff;border-color:var(--accent);}
.wprimary:active{transform:scale(.99);}
.wghost{background:var(--card);color:var(--accent);}
.wnote{font-size:12.5px;color:var(--muted);line-height:1.45;margin:-2px 0 20px;}
.wstatus{font-size:13.5px;color:var(--ink);margin-top:14px;line-height:1.5;min-height:18px;}
.rep-btns{margin-top:14px;}
.rep-btns .wbtn{margin-bottom:10px;}
.wfoot{font-size:11.5px;color:var(--muted);margin-top:22px;opacity:.85;}

.tag.prospect{background:#efe7f7;color:#6b4a9a;}
.tag.ref.good{background:#e3f0e8;color:#2f7d55;}
.tag.ref.slow{background:#f7ded9;color:#b23b3b;}
.tag.newprov{background:#e0eef1;color:#2b6d7a;}
.trendkey{font-family:inherit;font-size:11px;color:var(--muted);margin:2px 0 2px;display:flex;gap:12px;flex-wrap:wrap;}
.trendkey b{font-weight:600;}
.trendkey .u{color:#2f7d55;font-weight:600;}.trendkey .d{color:#b23b3b;font-weight:600;}
.addlead{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--card);border:1.5px dashed var(--line);color:var(--accent);font:inherit;font-weight:650;font-size:15px;padding:13px;border-radius:14px;margin:2px 0 14px;cursor:pointer;}
.addlead:active{transform:scale(.99);}
.addlead.citylead{margin:10px 0 4px;}
.removelead{width:100%;margin-top:14px;background:none;border:none;color:#b23b3b;font:inherit;font-weight:600;font-size:14.5px;padding:8px;cursor:pointer;}
</style>
</head>

if(!Object.keys(prevCounts).length){ BAKED_PROVIDERS.forEach(p=>prevCounts[p.id]=p.count); localStorage.setItem('refrounds_prev_v1',JSON.stringify(prevCounts)); }

const saveProspects=()=>localStorage.setItem('refrounds_prospects_v1',JSON.stringify(prospects));
function composeProviders(){
  const baseIds=new Set(baseProviders.map(p=>p.id));
  const before=prospects.length;
  prospects=prospects.filter(p=>!baseIds.has(p.id)); // graduated leads drop out; real record takes over
  if(prospects.length!==before)saveProspects();
  PROVIDERS=baseProviders.concat(prospects);
  rebuildById();
}
composeProviders();
const main=document.getElementById('main');
const norm=s=>(s||'').toLowerCase();

// effective provider = baked data with the user's edits merged on top
function eff(p){
  const e=edits[p.id]; if(!e) return p;
  const m=Object.assign({},p,e);
  const city=(m.city||'Address missing');
  const st=(m.state||'MS').toUpperCase();
  const parts=[m.street,m.suite,(city!=='Address missing'?city+', '+st:st),m.zip].filter(Boolean);
  m.mapq=parts.join(' ');
  return m;
}

// ---- clinic identity: staff belong to an office (address), not one provider ----
const ABBR={street:'st',str:'st',drive:'dr',road:'rd',avenue:'ave',av:'ave',boulevard:'blvd',highway:'hwy',hway:'hwy',lane:'ln',court:'ct',circle:'cir',parkway:'pkwy',place:'pl',suite:'ste',building:'bldg',north:'n',south:'s',east:'e',west:'w',northeast:'ne',northwest:'nw',southeast:'se',southwest:'sw'};
function normAddr(s){
  let t=(s||'').toLowerCase().replace(/[.,#]/g,' ').replace(/\s+/g,' ').trim();
  return t.split(' ').map(w=>ABBR[w]||w).join(' ').trim();
}
function clinicKey(p){
  const e=eff(p);
  const st=normAddr(e.street), cy=normAddr(e.city), stt=(e.state||'MS').toLowerCase();
  if(!st) return 'noaddr::'+(p.id);           // no street: keep staff private to that provider
  return st+'::'+cy+'::'+stt;
}
function clinicMates(p){
  const k=clinicKey(p);
  return PROVIDERS.filter(x=>clinicKey(x)===k);
}
function getStaff(p){return (staff[clinicKey(p)]||[]).slice().sort((a,b)=>a.name.localeCompare(b.name));}

// city index (rebuilt from effective cities so a moved provider lands in the right list)
let cities={}, cityNames=[];
function rebuildIndex(){
  cities={};
  PROVIDERS.forEach(p=>{const c=eff(p).city||'Address missing';(cities[c]=cities[c]||[]).push(p);});
  cityNames=Object.keys(cities).sort((a,b)=>{
    if(a==='Address missing')return 1; if(b==='Address missing')return -1;
    return a.localeCompare(b);
  });
}
rebuildIndex();

function cityStats(c){
  const list=cities[c]; let done=0;
  list.forEach(p=>{if(visited[p.id])done++;});
  return {total:list.length,done};
}
function tally(){
  const total=PROVIDERS.length;
  let done=0; PROVIDERS.forEach(p=>{if(visited[p.id])done++;});
  document.getElementById('tally').innerHTML=`<b>${done}</b> / ${total} visited`;
}
function ring(done,total){
  const r=18,c=2*Math.PI*r,pct=total?done/total:0;
  return `<div class="ring"><svg width="46" height="46" viewBox="0 0 46 46">
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="var(--line)" stroke-width="4"/>
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="var(--accent)" stroke-width="4"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}"/>
  </svg><span class="pct">${Math.round(pct*100)}</span></div>`;
}
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

function anyGraded(){return PROVIDERS.some(p=>{const t=trendFor(p);return t&&(t.kind==='good'||t.kind==='slow');});}
function trendFor(p){
  if(p.prospect)return null;
  const havePrev=prevCounts&&Object.keys(prevCounts).length;
  if(havePrev&&prevCounts[p.id]===undefined)return {kind:'new'};
  const hs=gainHist[p.id]||[];
  if(hs.length<MIN_PRIOR+1)return null;
  const latest=hs[hs.length-1];
  const prior=hs.slice(0,-1);
  const avg=prior.reduce((a,b)=>a+b,0)/prior.length;
  return {kind:(latest>=avg?'good':'slow'), gain:latest, avg:Math.round(avg*10)/10};
}
function refBadge(p){
  if(p.prospect)return `<span class="tag prospect">Prospect</span>`;
  const base=`${p.count} referral${p.count==1?'':'s'}`;
  const tr=trendFor(p);
  if(!tr)return `<span class="tag ref">${base}</span>`;
  if(tr.kind==='new')return `<span class="tag ref">${base}</span><span class="tag newprov">New</span>`;
  const g=tr.gain, gtxt=(g>0?'+'+g+' new':'0 new');
  if(tr.kind==='good')return `<span class="tag ref good">${base} \u00b7 ${gtxt}</span>`;
  return `<span class="tag ref slow">${base} \u00b7 ${gtxt}</span>`;
}
function provRow(p){

  const ntext=ncount?`<span class="notebadge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9h8M8 13h6"/><path d="M21 12a9 9 0 0 1-9 9c-1.4 0-2.7-.3-3.9-.9L3 21l1.9-5.1A9 9 0 1 1 21 12Z"/></svg>${ncount}</span>`:'';

    <div class="check" data-act="toggle"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>

function renderHome(){

  if(q){
    const matchP=PROVIDERS.filter(p=>norm(p.name).includes(q));

async function shareOrDownload(filename,text,mime){

      await navigator.share({files:[file],title:filename}); return;
    }
  }catch(e){if(e&&e.name==='AbortError')return;}
  const url=URL.createObjectURL(blob);

function rangeStart(range){

function buildLog(range){

  const active=PROVIDERS.filter(p=>{

  });

  let notesInRange=0, visitsInRange=0;
  PROVIDERS.forEach(p=>{(notes[p.id]||[]).forEach(n=>{if(inR(n.ts))notesInRange++;}); if(visited[p.id]&&inR(visited[p.id]))visitsInRange++;});
  const nm=liaisonName||'(liaison name)';
  let out='REFERRAL ROUNDS \u2014 ACTIVITY REPORT\n';
  out+='Liaison: '+nm+'\n';
  out+='Period: '+periodLabel(range)+'\n';
  out+=visitsInRange+' visit'+(visitsInRange==1?'':'s')+' logged \u00b7 '+active.length+' practice'+(active.length==1?'':'s')+' \u00b7 '+notesInRange+' note'+(notesInRange==1?'':'s')+'\n';
  out+='Generated '+new Date().toLocaleString()+'\n'+'='.repeat(40)+'\n';
  let curCity='';
  active.forEach(bp=>{
    const p=eff(bp), gc=p.city||'Address missing';
    if(gc!==curCity){curCity=gc;out+='\n\n### '+curCity.toUpperCase()+'\n';}
    const vtxt=(visited[bp.id]&&inR(visited[bp.id]))?'visited '+new Date(visited[bp.id]).toLocaleDateString():(visited[bp.id]?'visited earlier':'not marked');
    out+='\n'+p.name+'  ['+(p.type?p.type+' \u00b7 ':'')+bp.count+' referral'+(bp.count==1?'':'s')+' \u00b7 '+vtxt+']\n';
    const addr=[p.street,p.suite,(p.city&&p.city!=='Address missing'?p.city+', '+(p.state||'MS'):''),p.zip].filter(Boolean).join(', ');
    if(addr)out+='  '+addr+'\n';
    const stf=getStaff(bp);
    if(stf.length)out+='  Staff: '+stf.map(s=>s.name+(s.title?' ('+s.title+')':'')).join('; ')+'\n';
    (notes[bp.id]||[]).filter(n=>inR(n.ts)).sort((a,b)=>a.ts-b.ts).forEach(n=>{
      out+='  \u2022 '+new Date(n.ts).toLocaleString()+'\n    '+n.text.replace(/\n/g,'\n    ')+'\n';

  });
  if(!active.length)out+='\nNo activity logged in this period.\n';
  return out;
}

function seedSampleActivity(){
  const day=86400000, now=Date.now(); visited={}; notes={};
  const blurbs=['Dropped off marketing packet, spoke with front desk. All good.',
    'Introduced our new sports-medicine hours. Referral coordinator was receptive.',
    'Quick check-in. They said referrals have been going smoothly.',
    'Met the new NP. Walked through our QR referral form.',
    'Left updated provider cards. Office manager asked about turnaround times.',
    'Good visit \u2014 they mentioned a patient they are sending our way this week.',
    'Demoed the online referral link. Front desk liked how fast it was.'];
  const picks=PROVIDERS.slice(0,14);
  picks.forEach((p,i)=>{ visited[p.id]=now-(i%6)*day-3600000; });
  picks.slice(0,7).forEach((p,i)=>{ notes[p.id]=[{ts:now-(i%5)*day-5400000,text:blurbs[i]}]; });
  // seed a few months of per-doctor gain history so trend colors show live in the demo
  const prev={}, hist={};
  PROVIDERS.forEach((pp,i)=>{
    if(pp.prospect)return;
    const r=i%5;
    if(r===0){ return; }                        // brand-new referrer (not in last download) -> "New"
    prev[pp.id]=pp.count;
    if(r===1){ hist[pp.id]=[4,5,6,7]; }         // accelerating -> GREEN
    else if(r===2){ hist[pp.id]=[6,5,6,6]; }    // steady at pace -> GREEN
    else if(r===3){ hist[pp.id]=[8,7,6,0]; }    // cooled off, 0 new -> RED
    else { hist[pp.id]=[5,6,4,2]; }             // slowing below norm -> RED
  });
  prevCounts=prev; gainHist=hist;
  localStorage.setItem('refrounds_prev_v1',JSON.stringify(prev));
  localStorage.setItem('refrounds_hist_v1',JSON.stringify(hist));
  save(); saveN(); tally(); render();
}

  withNotes.sort((a,b)=>a.city.localeCompare(b.city)||a.name.localeCompare(b.name));
  let visCount=Object.keys(visited).length;
  let out='REFERRAL ROUNDS \u2014 CALL LOG\nExported '+new Date().toLocaleString()+'\n';
  out+=totalNotes+' note'+(totalNotes==1?'':'s')+' across '+withNotes.length+' provider'+(withNotes.length==1?'':'s')+'  \u00b7  '+visCount+' marked visited\n';
  out+='='.repeat(40)+'\n';
  let curCity='';
  withNotes.forEach(bp=>{
    const p=eff(bp);
    const gc=p.city||'Address missing';
    if(gc!==curCity){curCity=gc;out+='\n\n### '+curCity.toUpperCase()+'\n';}
    const v=visited[bp.id]?'visited '+new Date(visited[bp.id]).toLocaleDateString():'not visited';
    out+='\n'+p.name+'  ['+(p.type||'')+' \u00b7 '+bp.count+' referral'+(bp.count==1?'':'s')+' \u00b7 '+v+']\n';
    const addr=[p.street,p.suite,(p.city&&p.city!=='Address missing'?p.city+', '+(p.state||'MS'):''),p.zip].filter(Boolean).join(', ');
    if(addr)out+='  '+addr+'\n';
    const stf=getStaff(bp);
    if(stf.length){out+='  Staff: '+stf.map(s=>s.name+(s.title?' ('+s.title+')':'')).join('; ')+'\n';}
    if(p.phone)out+='  '+p.phone+'\n';
    if(p.fax)out+='  Fax: '+p.fax+'\n';
    notes[bp.id].slice().sort((a,b)=>a.ts-b.ts).forEach(n=>{
      out+='  \u2022 '+new Date(n.ts).toLocaleString()+'\n    '+n.text.replace(/\n/g,'\n    ')+'\n';
    });
  });
  if(!withNotes.length)out+='\nNo notes logged yet.\n';
  return out;
}

  </div>`;
  o.className='sheet-overlay show';o.onclick=closeSheet;document.body.style.overflow='hidden';
}

document.getElementById('restorefile').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;

document.getElementById('exportbtn').onclick=openDataSheet;

  if(clearProgress){visited={};notes={};edits={};staff={};save();saveN();saveE();saveS();}

// ---- PIN gate ----
const PINKEY='refrounds_pin', NOPIN='refrounds_nopin';
function hashPin(s){let x=2166136261>>>0;for(const c of s){x^=c.charCodeAt(0);x=Math.imul(x,16777619)>>>0;}return 'h'+x;}
const lock=document.getElementById('lock'), lkDots=document.getElementById('lkDots'),
      lkTitle=document.getElementById('lkTitle'), lkSub=document.getElementById('lkSub'),
      lkPad=document.getElementById('lkPad'), lkSkip=document.getElementById('lkSkip');
let gateState=null, entry='', firstPin=null;
function buildPad(){
  const keys=['1','2','3','4','5','6','7','8','9','fn','0','del'];
  lkPad.innerHTML='';
  keys.forEach(k=>{
    const b=document.createElement('button');
    if(k==='fn'){ b.className='blank'; b.disabled=true; }
    else if(k==='del'){ b.className='fn'; b.textContent='Delete'; b.onclick=()=>{entry=entry.slice(0,-1);paintDots();}; }
    else { b.textContent=k; b.onclick=()=>press(k); }
    lkPad.appendChild(b);
  });
}
function paintDots(bad){
  [...lkDots.children].forEach((d,i)=>d.classList.toggle('on',i<entry.length));
  if(bad){lkDots.classList.add('bad');setTimeout(()=>lkDots.classList.remove('bad'),360);}
}
function press(d){ if(entry.length>=4)return; entry+=d; paintDots();
  if(entry.length===4) setTimeout(submitPin,140);
}
function submitPin(){
  if(gateState==='verify'){
    if(hashPin(entry)===localStorage.getItem(PINKEY)){ unlock(); }
    else { entry=''; paintDots(true); }
  } else if(gateState==='set'){
    firstPin=entry; entry=''; gateState='confirm';
    lkSub.textContent='Enter it again to confirm.'; paintDots();
  } else if(gateState==='confirm'){
    if(entry===firstPin){ localStorage.setItem(PINKEY,hashPin(entry)); localStorage.removeItem(NOPIN); unlock(); }
    else { entry=''; firstPin=null; gateState='set'; lkSub.textContent="Those didn't match. Set a 4-digit PIN."; paintDots(true); }
  }
}
function unlock(){ lock.classList.add('hidden'); document.body.style.overflow=''; }
function startGate(){
  entry=''; buildPad();
  if(localStorage.getItem(NOPIN)==='1'){ unlock(); return; }
  if(localStorage.getItem(PINKEY)){
    gateState='verify'; lkTitle.textContent='Enter PIN'; lkSub.textContent='Enter your 4-digit PIN to unlock.'; lkSkip.style.display='none';
  } else {
    gateState='set'; lkTitle.textContent='Set a PIN'; lkSub.textContent='Create a 4-digit PIN to lock this app. Optional.';
  }
}
lkSkip.onclick=()=>{ localStorage.setItem(NOPIN,'1'); unlock(); };
startGate();

tally();render();

// ---------- ModMed import (client-side) ----------
function pickCol(headers,...keys){
  const H=headers.map(h=>({raw:h,n:(h||'').toString().toLowerCase().replace(/\s+/g,' ').trim()}));
  for(const k of keys){ const hit=H.find(x=>x.n.includes(k)); if(hit) return hit.raw; }
  return null;
}
function jslug(v){return (v||'').toString().toLowerCase().replace(/[^a-z0-9]/g,'');}
function fmtName(v){v=(v||'').toString().trim().toLowerCase(); if(v.includes(',')){const [l,f]=v.split(',');return (f.trim()+' '+l.trim()).replace(/\b\w/g,c=>c.toUpperCase());} return v.replace(/\b\w/g,c=>c.toUpperCase());}
function tcase(v){v=(v||'').toString().trim().toLowerCase(); return v?v.replace(/\b\w/g,c=>c.toUpperCase()):'';}
function junkNum(v){v=(v||'').toString().trim(); const d=v.replace(/\D/g,''); return (!d||/^0+$/.test(d))?'':v;}
function credNorm(v){v=(v||'').toString().toUpperCase().replace(/\./g,'').trim(); const m={MD:'MD',DO:'DO',NP:'NP',FNP:'FNP',CFNP:'FNP',FNPBC:'FNP',FNPC:'FNP',APRN:'APRN',PAC:'PA-C'}; return (['JR','SR','II','III',''].includes(v))?'':(m[v]||''); }
const CITYFIX={'holley springs':'Holly Springs','misissippi state':'Mississippi State','misissippi state university':'Mississippi State','mississippi state university':'Mississippi State'};
function fixCity(v){v=(v||'').toString().replace(/[ ,\.]+$/,'').trim(); if(!v)return 'Address missing'; const t=tcase(v).replace(/\s+/g,' '); return CITYFIX[t.toLowerCase()]||t; }

function handleImport(file){
  if(typeof XLSX==='undefined'){ alert('Still loading the spreadsheet reader — give it a second and try again.'); return; }
  const status=document.getElementById('impStatus'); status.textContent='Reading '+file.name+'…';
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!data.length){ status.textContent='That sheet looks empty.'; return; }
      const headers=Object.keys(data[0]);
      const col={
        cnt:pickCol(headers,'patient count','count','referrals','volume'),
        name:pickCol(headers,'provider name','referring provider name','name'),
        a1:pickCol(headers,'address line 1','address 1','street','address'),
        a2:pickCol(headers,'address line 2','address 2','suite'),
        city:pickCol(headers,'city'),
        state:pickCol(headers,'state'),
        zip:pickCol(headers,'zip','postal'),
        phone:pickCol(headers,'work phone','phone'),
        fax:pickCol(headers,'fax'),
        suf:pickCol(headers,'suffix','credential','degree')
      };
      if(!col.name||!col.cnt){
        status.innerHTML='Could not find the needed columns. I found:<br><b>'+headers.join(', ')+'</b><br>I need at least a provider <b>name</b> and a <b>patient count</b> column.';
        return;
      }
      const groups={};
      data.forEach(row=>{
        const nm=(row[col.name]||'').toString().trim(); if(!nm) return;
        const city=fixCity(col.city?row[col.city]:'');
        const key=nm+'||'+city;
        (groups[key]=groups[key]||[]).push(row);
      });
      const out=[]; const seen={};
      Object.keys(groups).forEach(key=>{
        const rows=groups[key].slice().sort((a,b)=>(+b[col.cnt]||0)-(+a[col.cnt]||0));
        const top=rows[0];
        const nm=(top[col.name]||'').toString().trim();
        const city=fixCity(col.city?top[col.city]:'');
        let count=0; rows.forEach(r=>count+=(+r[col.cnt]||0));
        const firstGood=(c,fn)=>{ if(!c) return ''; for(const r of rows){const v=fn(r[c]); if(v) return v;} return ''; };
        const phone=firstGood(col.phone,junkNum), fax=firstGood(col.fax,junkNum);
        const zip=firstGood(col.zip,v=>{v=(v||'').toString().trim(); return (v.toUpperCase()==='OTHER')?'':v;});
        let typ=''; if(col.suf){ for(const r of rows){const c=credNorm(r[col.suf]); if(c){typ=c;break;}} }
        const state=((col.state?top[col.state]:'')||'MS').toString().toUpperCase().trim()||'MS';
        const street=tcase(col.a1?top[col.a1]:''), suite=tcase(col.a2?top[col.a2]:'');
        let base=(jslug(nm)+'__'+jslug(city))||'p', id=base, i=2; while(seen[id]){id=base+'_'+(i++);} seen[id]=1;
        const parts=[street,suite,(city!=='Address missing'?city+', '+state:state),zip].filter(Boolean);
        out.push({id,name:fmtName(nm),type:typ,city,street,suite,zip,state,phone,fax,count,mapq:parts.join(' ')});
      });
      out.sort((a,b)=>a.city.localeCompare(b.city)||b.count-a.count||a.name.localeCompare(b.name));
      const cities=new Set(out.map(p=>p.city)).size;
      status.textContent='Imported '+out.length+' providers across '+cities+' cities.';
      const wasSeed=localStorage.getItem('refrounds_seed')==='1'; localStorage.removeItem('refrounds_seed');
      const newPrev={};
      if(wasSeed){ gainHist={}; localStorage.removeItem('refrounds_hist_v1'); }
      out.forEach(np=>{
        newPrev[np.id]=np.count;
        if(!wasSeed && prevCounts[np.id]!==undefined){
          const g=np.count-prevCounts[np.id];
          (gainHist[np.id]=gainHist[np.id]||[]).push(g);
        }
      });
      prevCounts=newPrev;
      localStorage.setItem('refrounds_prev_v1',JSON.stringify(prevCounts));
      localStorage.setItem('refrounds_hist_v1',JSON.stringify(gainHist));
      loadData(out,{clearProgress:wasSeed});
    }catch(err){ document.getElementById('impStatus').textContent='Sorry — could not read that file. Make sure it is the Excel export from your CRM.'; }
  };
  r.readAsArrayBuffer(file);
}
document.getElementById('importfile').addEventListener('change',e=>{ if(e.target.files[0]) handleImport(e.target.files[0]); e.target.value=''; });
function openImport(){ closeSheet(); document.getElementById('importfile').click(); }
